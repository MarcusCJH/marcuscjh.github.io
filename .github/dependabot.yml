version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      # Group all dependency updates into a single PR (major, minor, patch)
      all:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      # Group security fixes into one PR
      security:
        applies-to: security-updates
        patterns:
          - "*"
    reviewers:
      - "MarcusCJH"
    assignees:
      - "MarcusCJH"
    commit-message:
      prefix: "chore"
      include: "scope"
