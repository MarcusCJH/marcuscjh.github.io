    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://marcuscjh.com/">

    <meta name="twitter:site" content="@marcuscjh">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://marcuscjh.com/">
    
    <!-- Alternate URLs (for www subdomain if configured) -->
    <link rel="alternate" href="https://www.marcuscjh.com/" hreflang="en">
    
    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    
    <!-- WebSite Schema (static — Person + Projects schemas are injected dynamically from data.json) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Marcus Chan — Portfolio",
        "url": "https://marcuscjh.com",
        "description": "Personal portfolio of Marcus Chan, Full Stack Engineer & Cloud Architect based in Singapore.",
        "author": {
            "@type": "Person",
            "name": "Marcus Chan"
        }
    }
    </script>

</head>

<body>
    <!-- Matrix Background Animation -->
    <canvas id="matrix-canvas"></canvas>
    
    <!-- Particle System -->
    <div id="particles-container"></div>
    
    <!-- Main Container -->
    <div class="main-container">
        <!-- Navigation -->
        <nav class="nav-container">
            <div class="nav-brand">
                <span class="brand-text">marcus.cjh</span>
                <span class="brand-cursor">_</span>
            </div>
            <div class="nav-menu" id="nav-menu">
                <!-- Navigation items will be dynamically loaded from data.json -->
            </div>
            <div class="nav-toggle" id="nav-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="hero-section" id="hero-section">
            <div class="hero-content">
                <div class="glitch-container">
                    <h1 class="hero-title glitch" data-text="marcus.cjh">marcus.cjh</h1>
                    <div class="terminal-line">
                        <span class="prompt">$</span>
                        <span class="typed-text" id="typed-text"></span>
                        <span class="cursor-blink">|</span>
                    </div>
                </div>
                
                <div class="hero-description">
                    <p class="fade-in-up">Full Stack Engineer & Cloud Architect</p>
                    <p class="fade-in-up delay-1">Transforming ideas into scalable digital solutions</p>
                </div>

                <div class="social-links fade-in-up delay-2">
                    <!-- Social links will be dynamically loaded -->
                </div>

                <div class="scroll-indicator">
                    <div class="scroll-arrow">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>
        </section>

        <!-- Content Sections -->
        <section class="content-section" id="timeline-section">
            <div class="section-header">
                <h2 class="section-title">
                    <span class="section-icon"><i class="fas fa-code-branch"></i></span>
                    <span class="glitch" data-text="timeline">timeline</span>
                </h2>
            </div>
            <div class="timeline-container">
                <div class="timeline-search">
                    <input type="text" id="timeline-search" placeholder="Search timeline entries (e.g., Marcus Chan, Accenture, AWS)...">
                </div>
                <div class="timeline-filters">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-asterisk"></i> All
                    </button>
                    <button class="filter-btn" data-filter="work">
                        <i class="fas fa-briefcase"></i> Work
                    </button>
                    <button class="filter-btn" data-filter="education">
                        <i class="fas fa-graduation-cap"></i> Education
                    </button>
                    <button class="filter-btn" data-filter="certification">
                        <i class="fas fa-certificate"></i> Certs
                    </button>
                </div>
                <div class="timeline-wrapper" id="timeline-wrapper">
                    <div class="timeline-track">
                        <div class="timeline-line"></div>
                        <div class="timeline-progress" id="timeline-progress"></div>
                        <div class="timeline-items" id="timeline-items">
                            <!-- Timeline items will be dynamically loaded -->
                        </div>
                    </div>
                </div>
                <div class="timeline-nav">
                    <button class="timeline-nav-btn" id="timeline-prev">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div class="timeline-indicator" id="timeline-indicator">
                        <!-- Navigation dots will be dynamically generated -->
                    </div>
                    <button class="timeline-nav-btn" id="timeline-next">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </section>

        <section class="content-section" id="showcase-section">
            <div class="section-header">
                <h2 class="section-title">
                    <span class="section-icon"><i class="fas fa-rocket"></i></span>
                    <span class="glitch" data-text="projects">projects</span>
                </h2>
            </div>
            <div class="showcase-grid" id="showcase-grid">
                <!-- Showcase items will be dynamically loaded -->
            </div>
        </section>

        <section class="content-section" id="cv-section">
            <div class="section-header">
                <h2 class="section-title">
                    <span class="section-icon"><i class="fas fa-file-code"></i></span>
                    <span class="glitch" data-text="resume">resume</span>
                </h2>
            </div>
            <div class="cv-container">
                <div class="cv-preview" id="cv-preview">
                    <div class="cv-placeholder">
                        <i class="fas fa-file-pdf"></i>
                        <p>Click to view resume</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-container" id="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title"></h3>
                <button class="modal-close" id="modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-content" id="modal-content">
                <!-- Modal content will be dynamically loaded -->
            </div>
        </div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">
                <span class="glitch" data-text="marcus.cjh">marcus.cjh</span>
            </div>
            <div class="loading-bar">
                <div class="loading-progress" id="loading-progress"></div>
            </div>
            <div class="loading-text">Initializing systems...</div>
        </div>
    </div>

    <!-- Vite will inject the main.ts script here -->
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
